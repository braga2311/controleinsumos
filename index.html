<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GAM · Controle de Insumos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04091a;--bg2:#070f22;--surface:#0c1a36;--surface2:#112040;--surface3:#172c52;
  --border:rgba(82,130,255,0.14);--border2:rgba(82,130,255,0.28);
  --text:#e6edf8;--text2:#7a9bc5;--text3:#3a5880;
  --accent:#1e56d6;--accent2:#4d8af0;--accent-bg:rgba(30,86,214,0.13);--accent-glow:rgba(30,86,214,0.32);
  --green:#10b981;--green-bg:rgba(16,185,129,0.12);--green-border:rgba(16,185,129,0.3);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,0.12);--yellow-border:rgba(245,158,11,0.3);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);--red-border:rgba(239,68,68,0.3);
  --nav-h:62px;--header-h:58px;
  --radius:14px;--radius-sm:9px;--radius-xs:6px;
  --shadow:0 2px 12px rgba(0,0,0,0.35);
  --shadow-card:0 4px 20px rgba(0,0,0,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;display:flex;flex-direction:column}

/* HEADER */
#app-header{height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:50}
.logo-area{display:flex;align-items:center;gap:10px}
.logo-img{width:38px;height:38px;object-fit:contain;border-radius:8px}
.app-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.app-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.header-right{display:flex;align-items:center;gap:8px}
.sync-btn{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;font-weight:600}
.sync-btn:hover{border-color:var(--border2);color:var(--text)}
.sync-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;transition:transform .6s}
.sync-btn.spinning svg{animation:spin .7s linear infinite}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all .3s;background:var(--text3)}
.sdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sdot.err{background:var(--red)}
.sdot.load{background:var(--yellow);animation:blink 1s infinite}
.date-pill{background:var(--accent-bg);border:1px solid var(--border2);color:var(--accent2);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGES */
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:14px 14px calc(var(--nav-h)+14px);display:none;flex-direction:column}
.page.active{display:flex}
.page-inner{max-width:800px;width:100%;margin:0 auto;flex:1}

/* BOTTOM NAV */
#bottom-nav{height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:color .15s;padding:4px 2px;position:relative}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.nav-btn.active{color:var(--accent2)}
.nav-btn.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:var(--accent);border-radius:0 0 3px 3px}
.nav-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--red);color:white;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px}
.nav-badge.show{display:flex}

/* FILTER CHIPS */
.filter-chips{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;flex-wrap:nowrap}
.chip{white-space:nowrap;padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text3);font-family:'DM Sans',sans-serif}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip:hover:not(.active){background:var(--surface2);color:var(--text)}
.custom-dates{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.custom-dates label{font-size:12px;color:var(--text3)}
.custom-dates input[type=date]{padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none}
.custom-dates input[type=date]:focus{border-color:var(--accent)}

/* SEARCH */
.sbox{position:relative;flex:1;min-width:140px;margin-bottom:10px}
.sbox input{width:100%;padding:9px 10px 9px 34px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
.sbox input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.sbox svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;pointer-events:none}

/* SUMMARY STRIP */
.strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.strip.s2{grid-template-columns:repeat(2,1fr)}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;box-shadow:var(--shadow)}
.stat .v{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.stat .l{font-size:11px;color:var(--text3);margin-top:3px}

/* INSUMO CARDS — PROFISSIONAIS */
.ic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:460px){.ic-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:660px){.ic-grid{grid-template-columns:repeat(4,1fr)}}
.ic-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 12px 12px;
  cursor:pointer;
  transition:all .18s;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow-card);
  display:flex;flex-direction:column;gap:4px;
}
.ic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);border-radius:var(--radius) var(--radius) 0 0;opacity:0;transition:opacity .2s}
.ic-card:hover{border-color:var(--accent2);box-shadow:0 6px 28px rgba(30,86,214,0.25);transform:translateY(-1px)}
.ic-card:hover::before{opacity:1}
.ic-card.warn{border-color:var(--yellow-border)}
.ic-card.warn::before{background:var(--yellow)}
.ic-card.crit{border-color:var(--red-border)}
.ic-card.crit::before{background:var(--red)}
.ic-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ic-emoji{font-size:22px;line-height:1}
.ic-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.ic-card.warn .ic-dot{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.ic-card.crit .ic-dot{background:var(--red);box-shadow:0 0 6px var(--red)}
.ic-nome{font-size:13px;font-weight:700;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ic-ref{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px}
.ic-saldo-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  font-family:'DM Mono',monospace;font-size:14px;font-weight:700;
  background:var(--accent-bg);color:var(--accent2);
  border:1px solid rgba(30,86,214,0.25);
  align-self:flex-start;
}
.ic-card.warn .ic-saldo-badge{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow-border)}
.ic-card.crit .ic-saldo-badge{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.ic-unit{font-size:10px;color:var(--text3);margin-top:2px}

/* HIST */
.hist-list{display:flex;flex-direction:column}
.hi{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border)}
.hi:last-child{border-bottom:none}
.hi-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hi-badge.Estoque{background:var(--green-bg)}
.hi-badge.Requisicao{background:var(--yellow-bg)}
.hi-badge.Expedicao{background:var(--red-bg)}
.hi-info{flex:1;min-width:0}
.hi-nome{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-meta{font-size:11px;color:var(--text3);margin-top:1px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.hi-qty{font-family:'DM Mono',monospace;font-weight:700;font-size:13px;flex-shrink:0;white-space:nowrap}
.hi-qty.Estoque{color:var(--green)}
.hi-qty.Requisicao{color:var(--yellow)}
.hi-qty.Expedicao{color:var(--red)}
.status-chip{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}
.status-chip.pendente{background:var(--yellow-bg);color:var(--yellow)}
.status-chip.requisitado{background:var(--accent-bg);color:var(--accent2)}

/* RELATORIOS */
.rel-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.rel-row:last-child{border-bottom:none}
.rel-nome{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rel-bar-wrap{width:70px;height:5px;background:var(--surface3);border-radius:3px;margin:0 10px;overflow:hidden;flex-shrink:0}
.rel-bar{height:100%;border-radius:3px;transition:width .4s}
.rel-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--text2);min-width:40px;text-align:right;flex-shrink:0}

/* PERIOD TABS */
.period-tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.pt{white-space:nowrap;padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text3);font-family:'DM Sans',sans-serif}
.pt.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-hdr h2{font-size:15px;font-weight:700}

/* FAB */
.fab{position:fixed;bottom:calc(var(--nav-h)+16px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:white;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px var(--accent-glow);z-index:40;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s}
.fab:hover{background:#1648b8}
.fab:active{transform:scale(.93)}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:800px;padding:20px 18px 32px;transform:translateY(30px);transition:transform .25s;max-height:90dvh;overflow-y:auto}
@media(min-width:600px){.overlay{align-items:center}.sheet{border-radius:16px;max-height:82dvh}}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px}

/* FORM */
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.fg select option{background:#070f22}
.fg input:disabled{background:var(--surface);color:var(--text3);cursor:default}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 2px 10px var(--accent-glow)}
.btn-p:hover{background:#1648b8}
.btn-p:active{transform:scale(.98)}
.btn-p.green{background:#059669;box-shadow:0 2px 10px rgba(16,185,129,.3)}
.btn-p.yellow{background:#d97706;box-shadow:0 2px 10px rgba(245,158,11,.3)}
.btn-p.red{background:#dc2626;box-shadow:0 2px 10px rgba(239,68,68,.3)}
.btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-s:hover{background:var(--surface3);color:var(--text)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ALERT */
.alert{border-radius:var(--radius-sm);padding:9px 13px;font-size:13px;font-weight:500;margin-bottom:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.alert-w{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.pending-bar{background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--radius-sm);padding:9px 13px;font-size:13px;color:var(--yellow);display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;gap:10px;flex-wrap:wrap}

/* MISC */
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}
.toast{position:fixed;top:calc(var(--header-h)+8px);left:50%;transform:translateX(-50%) translateY(-8px);background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .25s;pointer-events:none;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loading-overlay.hide{opacity:0;pointer-events:none}
.loading-title{font-size:16px;font-weight:700;color:var(--text2)}
.loading-sub{font-size:12px;color:var(--text3)}
.emoji-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.emoji-opt{font-size:22px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s}
.emoji-opt:hover{background:var(--surface3)}
.divider{height:1px;background:var(--border);margin:12px 0}
</style>
</head>

const ld=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
function salvarEmojis(){const m={};insumos.forEach(i=>{if(i.emoji!=='📦')m[i.nome]=i.emoji});sv('emap6',m)}
function carregarEmojis(){return ld('emap6',{})}
function salvarPend(){sv('pend6',pendentes)}
function carregarPend(){pendentes=ld('pend6',[])}

// ── UTILS ─────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const norm=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function getDataContabil(){const d=new Date();if(d.getHours()<8)d.setDate(d.getDate()-1);return d.toLocaleDateString('pt-BR')}
function getTurno(){const h=new Date().getHours();if(h>=6&&h<14)return'Turno A · 06h–14h';if(h>=14&&h<22)return'Turno B · 14h–22h';return'Turno C · 22h–06h'}

function toISO(s){
  if(!s)return'';
  const str=String(s).trim();
  if(str.includes('T'))return str.substring(0,10);
  if(/^\d{4}-\d{2}-\d{2}/.test(str))return str.substring(0,10);
  const p=str.split('/');
  if(p.length===3)return`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  return str.substring(0,10);
}
function fmtData(s){
  const iso=toISO(String(s||''));
  if(!iso)return'—';
  const[y,m,d]=iso.split('-');
  return`${d}/${m}/${y}`;
}
function nomeItem(h){return h.item||h.insumo||''}

// ── FILTROS TEMPORAIS ─────────────────────────────────────
// Retorna {ini:'yyyy-mm-dd', fim:'yyyy-mm-dd'} ou {ini:'',fim:''}
function getPeriodo(tab){
  const p=periodos[tab]||'todos';
  const hoje=new Date();
  const iso=d=>d.toISOString().split('T')[0];
  if(p==='hoje'){const s=iso(hoje);return{ini:s,fim:s}}
  if(p==='semana'){
    const d=new Date(hoje);d.setDate(hoje.getDate()-hoje.getDay());
    return{ini:iso(d),fim:iso(hoje)}
  }
  if(p==='mes'){
    const d=new Date(hoje.getFullYear(),hoje.getMonth(),1);
    return{ini:iso(d),fim:iso(hoje)}
  }
  if(p==='ano'){
    return{ini:`${hoje.getFullYear()}-01-01`,fim:iso(hoje)}
  }
  if(p==='custom'){
    return{
      ini:document.getElementById('ini-'+tab)?.value||'',
      fim:document.getElementById('fim-'+tab)?.value||''
    }
  }
  return{ini:'',fim:''}
}

function inPeriod(dataApi,ini,fim){
  const iso=toISO(dataApi);
  if(!iso)return true;
  if(ini&&iso<ini)return false;
  if(fim&&iso>fim)return false;
  return true;
}

function buildChips(tab, renderFn){
  const chips=[
    {k:'todos',l:'Todos'},
    {k:'hoje',l:'Hoje'},
    {k:'semana',l:'Esta semana'},
    {k:'mes',l:'Este mês'},
    {k:'ano',l:'Este ano'},
    {k:'custom',l:'Personalizado'},
  ];
  const cur=periodos[tab]||'todos';
  const el=document.getElementById('chips-'+tab);
  el.innerHTML=chips.map(c=>`<button class="chip${c.k===cur?' active':''}" onclick="setPeriodo('${tab}','${c.k}')">${c.l}</button>`).join('');
  const cd=document.getElementById('cdates-'+tab);
  if(cd)cd.style.display=cur==='custom'?'flex':'none';
}

function setPeriodo(tab,p){
  periodos[tab]=p;
  buildChips(tab);
  if(tab==='req')renderReq();
  else if(tab==='exp')renderExp();
  else if(tab==='hist')renderHist();
  else if(tab==='rel')renderRel();
}

// ── SYNC STATUS ───────────────────────────────────────────
function setSS(state,msg){
  document.getElementById('sdot').className='sdot '+state;
  document.getElementById('smsg').textContent=msg;
  const btn=document.getElementById('sync-btn');
  btn.classList.toggle('spinning',state==='load');
}

// ── API ───────────────────────────────────────────────────
async function apiGet(action){
  const r=await fetch(`${API}?action=${action}`);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return JSON.parse(await r.text());
}
async function apiPost(payload){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const res=JSON.parse(await r.text());
  if(res.result!=='success')throw new Error(res.message||'Erro');
  return res;
}

// ── CARREGAR ──────────────────────────────────────────────
async function carregarInsumos(){
  const data=await apiGet('buscarInsumos');
  if(!Array.isArray(data)||!data.length)return;
  const emap=carregarEmojis();
  insumos=data.filter(d=>d.nome).map(d=>({nome:String(d.nome).trim(),ref:String(d.ref||'').trim(),emoji:emap[String(d.nome).trim()]||'📦'}));
}

async function carregarHistorico(){
  const data=await apiGet('buscarHistorico');
  if(!Array.isArray(data))return;
  historico=data.filter(h=>nomeItem(h)).sort((a,b)=>toISO(b.data).localeCompare(toISO(a.data)));
}

async function carregarTudo(manual){
  setSS('load','Sincronizando...');
  if(manual)document.getElementById('loading-msg')&&(document.getElementById('loading-msg').textContent='Atualizando dados...');
  try{
    await carregarInsumos();
    await carregarHistorico();
    await enviarPendentes();
    setSS('ok','Sync · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){setSS('err','Sem conexão');console.warn(e)}
  renderTudo();
  document.getElementById('loading-overlay').classList.add('hide');
}

async function enviarPendentes(){
  if(!pendentes.length)return;
  const fila=[...pendentes];pendentes=[];salvarPend();
  for(const p of fila){try{await apiPost(p)}catch(e){pendentes.push(p)}}
  salvarPend();renderPendingWarn();atualizarBadge();
}

// ── SALDO ─────────────────────────────────────────────────
function calcSaldo(ins){
  const nN=norm(ins.nome),rN=norm(ins.ref);
  return historico.reduce((acc,h)=>{
    if(norm(nomeItem(h))!==nN&&!(rN&&rN!==''&&norm(h.ref)===rN))return acc;
    return acc+(Number(h.qtd)||0);
  },0);
}

// ── RENDER ────────────────────────────────────────────────
function renderTudo(){
  renderEstoque();renderReq();renderExp();renderHist();renderRel();
  popularSelect();atualizarBadge();
  ['req','exp','hist','rel'].forEach(t=>buildChips(t));
}

function renderEstoque(){
  const busca=norm(document.getElementById('busca-est')?.value||'');
  const lista=insumos.filter(i=>!busca||norm(i.nome).includes(busca)||norm(i.ref).includes(busca));
  const ents=historico.filter(h=>h.tipo==='Estoque').reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  const sais=historico.filter(h=>h.tipo!=='Estoque').reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  const saldo=historico.reduce((s,h)=>s+(Number(h.qtd)||0),0);
  document.getElementById('se-saldo').textContent=saldo;
  document.getElementById('se-ent').textContent=ents;
  document.getElementById('se-sai').textContent=sais;
  document.getElementById('alerta-est').innerHTML=pendentes.length?`<div class="alert alert-w">⏳ ${pendentes.length} lançamento(s) aguardando envio</div>`:'';
  const grid=document.getElementById('grid-est');
  if(!lista.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div><p>Nenhum insumo.</p></div>';return}
  grid.innerHTML=lista.map(ins=>{
    const saldo=calcSaldo(ins);
    const cls=saldo<=0?'crit':saldo<=20?'warn':'';
    return`<div class="ic-card ${cls}" onclick="abrirDetalhe(${JSON.stringify(ins.nome)})">
      <div class="ic-top"><span class="ic-emoji">${ins.emoji}</span><div class="ic-dot"></div></div>
      <div class="ic-nome">${ins.nome}</div>
      <div class="ic-ref">${ins.ref}</div>
      <div class="ic-saldo-badge">${saldo} <span style="font-size:10px;font-weight:400;opacity:.7">un</span></div>
    </div>`;
  }).join('');
}

function renderReq(){
  const busca=norm(document.getElementById('busca-req')?.value||'');
  const{ini,fim}=getPeriodo('req');
  const lista=historico.filter(h=>h.tipo==='Requisicao'&&(!busca||norm(nomeItem(h)).includes(busca)||norm(h.ref).includes(busca))&&inPeriod(h.data,ini,fim));
  document.getElementById('sr-total').textContent=lista.reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  document.getElementById('sr-mov').textContent=lista.length;
  renderHistList('list-req',lista);
}

function renderExp(){
  const busca=norm(document.getElementById('busca-exp')?.value||'');
  const{ini,fim}=getPeriodo('exp');
  const lista=historico.filter(h=>h.tipo==='Expedicao'&&(!busca||norm(nomeItem(h)).includes(busca)||norm(h.ref).includes(busca))&&inPeriod(h.data,ini,fim));
  document.getElementById('sx-total').textContent=lista.reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  document.getElementById('sx-mov').textContent=lista.length;
  renderHistList('list-exp',lista);
}

function renderHist(){
  const busca=norm(document.getElementById('busca-hist')?.value||'');
  const{ini,fim}=getPeriodo('hist');
  const lista=historico.filter(h=>(filtroHist==='todos'||h.tipo===filtroHist)&&(!busca||norm(nomeItem(h)).includes(busca)||norm(h.ref).includes(busca))&&inPeriod(h.data,ini,fim));
  renderHistList('list-hist',lista);
}

function setFiltroHist(f){
  filtroHist=f;
  document.querySelectorAll('.period-tabs .pt').forEach((b,i)=>b.classList.toggle('active',['todos','Estoque','Requisicao','Expedicao'][i]===f));
  renderHist();
}

function renderHistList(elId,lista){
  const el=document.getElementById(elId);
  if(!lista.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>Nenhum registro no período.</p></div>';return}
  el.innerHTML=lista.map(h=>{
    const qtdAbs=Math.abs(Number(h.qtd)||0),isPos=Number(h.qtd)>=0;
    const stN=norm(h.status||''),stCls=stN.includes('pend')?'pendente':'requisitado';
    return`<div class="hi">
      <div class="hi-badge ${h.tipo}">${TIPO_EMOJI[h.tipo]||'📦'}</div>
      <div class="hi-info">
        <div class="hi-nome">${nomeItem(h)||'—'} <span style="color:var(--text3);font-size:10px;font-family:'DM Mono',monospace">${h.ref||''}</span></div>
        <div class="hi-meta">${fmtData(h.data)} · ${TIPO_LABEL[h.tipo]||h.tipo}${h.status?` <span class="status-chip ${stCls}">${h.status}</span>`:''}
        </div>
      </div>
      <div class="hi-qty ${h.tipo}">${isPos?'+':'-'}${qtdAbs}</div>
    </div>`;
  }).join('');
}

function renderRel(){
  const{ini,fim}=getPeriodo('rel');
  const filt=historico.filter(h=>inPeriod(h.data,ini,fim));
  const ents=filt.filter(h=>h.tipo==='Estoque'),reqs=filt.filter(h=>h.tipo==='Requisicao'),exps=filt.filter(h=>h.tipo==='Expedicao');
  document.getElementById('rr-ent').textContent=ents.reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  document.getElementById('rr-req').textContent=reqs.reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  document.getElementById('rr-exp').textContent=exps.reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  renderGrupoRel(ents,'rel-est','var(--green)');
  renderGrupoRel(reqs,'rel-req','var(--yellow)');
  renderGrupoRel(exps,'rel-exr','var(--red)');
}

function renderGrupoRel(arr,elId,cor){
  const ag={};arr.forEach(h=>{const k=nomeItem(h)||'—';ag[k]=(ag[k]||0)+Math.abs(Number(h.qtd)||0)});
  const sorted=Object.entries(ag).sort((a,b)=>b[1]-a[1]).slice(0,8),max=sorted[0]?.[1]||1;
  document.getElementById(elId).innerHTML=!sorted.length?'<div style="color:var(--text3);font-size:13px;padding:6px 0">Sem dados no período.</div>':sorted.map(([nome,total])=>`<div class="rel-row"><div class="rel-nome">📦 ${nome}</div><div class="rel-bar-wrap"><div class="rel-bar" style="width:${Math.round(total/max*100)}%;background:${cor}"></div></div><div class="rel-val">${total}</div></div>`).join('');
}

function atualizarBadge(){
  const p=pendentes.filter(x=>x.tipo==='Requisicao').length;
  const b=document.getElementById('badge-req');b.textContent=p;b.classList.toggle('show',p>0);
}

// ── FORM ──────────────────────────────────────────────────
const FORM_CFG={estoque:{tipo:'Estoque',label:'Entrada de Estoque',cor:'green'},req:{tipo:'Requisicao',label:'Nova Requisição',cor:'yellow'},exp:{tipo:'Expedicao',label:'Nova Expedição',cor:'red'}};

function abrirForm(){
  const cfg=FORM_CFG[tabAtual]||FORM_CFG.estoque;tipoForm=cfg.tipo;
  document.getElementById('form-title').textContent=cfg.label;
  const btn=document.getElementById('btn-salvar');btn.className=`btn btn-p btn-full ${cfg.cor}`;btn.textContent='Registrar';
  document.getElementById('f-data').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-qty').value='';
  popularSelect();renderPendingWarn();abrirOv('ov-form');
}

function popularSelect(){
  const sel=document.getElementById('f-insumo'),cur=sel.value;
  sel.innerHTML='<option value="">Selecione...</option>'+insumos.map(i=>`<option value="${encodeURIComponent(i.nome)}">${i.emoji} ${i.nome} · ${i.ref}</option>`).join('');
  if(cur)sel.value=cur;onInsChange();
}

function onInsChange(){
  const k=document.getElementById('f-insumo').value;
  const ins=insumos.find(i=>encodeURIComponent(i.nome)===k);
  document.getElementById('f-ref').value=ins?ins.ref:'';
}

function renderPendingWarn(){
  const el=document.getElementById('pending-warn');if(!el)return;
  el.innerHTML=pendentes.length?`<div class="pending-bar">⏳ ${pendentes.length} offline <button class="btn btn-s btn-sm" onclick="carregarTudo(true)">Enviar</button></div>`:'';
}

async function salvar(){
  const key=document.getElementById('f-insumo').value,qty=parseFloat(document.getElementById('f-qty').value),data=document.getElementById('f-data').value;
  const ins=insumos.find(i=>encodeURIComponent(i.nome)===key);
  if(!ins)return toast('Selecione um insumo.');
  if(!qty||qty<=0)return toast('Informe uma quantidade válida.');
  if(!data)return toast('Informe a data.');
  if(tipoForm!=='Estoque'){const s=calcSaldo(ins);if(qty>s)return toast(`⚠️ Saldo insuficiente! Disponível: ${s} un`);}
  const payload={tipo:tipoForm,nome_item:ins.nome,referencia:ins.ref,quantidade:qty,dataManual:data};
  const btn=document.getElementById('btn-salvar');btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Enviando...';
  try{
    await apiPost(payload);fecharOv('ov-form');
    toast(`✅ ${TIPO_LABEL[tipoForm]} de ${qty} un registrada!`);
    await carregarHistorico();renderTudo();
  }catch(e){pendentes.push({...payload,_id:uid(),_ts:Date.now()});salvarPend();fecharOv('ov-form');toast('⚠️ Offline — salvo localmente');renderPendingWarn();atualizarBadge();}
  btn.disabled=false;btn.textContent='Registrar';document.getElementById('f-qty').value='';
}

// ── DETALHE ───────────────────────────────────────────────
function abrirDetalhe(nome){
  const ins=insumos.find(i=>i.nome===nome);if(!ins)return;
  const nN=norm(ins.nome),rN=norm(ins.ref);
  const movs=historico.filter(h=>norm(nomeItem(h))===nN||(rN&&rN!==''&&norm(h.ref)===rN));
  const saldo=calcSaldo(ins);
  const tE=movs.filter(h=>h.tipo==='Estoque').reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  const tR=movs.filter(h=>h.tipo==='Requisicao').reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  const tX=movs.filter(h=>h.tipo==='Expedicao').reduce((s,h)=>s+Math.abs(Number(h.qtd)||0),0);
  document.getElementById('det-body').innerHTML=`
    <div style="display:flex;align-items:center;gap:13px;margin-bottom:16px">
      <span style="font-size:40px">${ins.emoji}</span>
      <div><div style="font-size:18px;font-weight:700">${ins.nome}</div><div style="font-size:12px;color:var(--text3);font-family:'DM Mono',monospace">${ins.ref}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
      <div class="stat"><div class="v" style="color:var(--accent2)">${saldo}</div><div class="l">Saldo</div></div>
      <div class="stat"><div class="v" style="color:var(--green)">${tE}</div><div class="l">Entradas</div></div>
      <div class="stat"><div class="v" style="color:var(--yellow)">${tR}</div><div class="l">Req.</div></div>
      <div class="stat"><div class="v" style="color:var(--red)">${tX}</div><div class="l">Exped.</div></div>
    </div>
    ${movs.length?'<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Últimos movimentos</div>'+movs.slice(0,8).map(h=>{const ip=Number(h.qtd)>=0,qa=Math.abs(Number(h.qtd)||0);return`<div class="hi"><div class="hi-badge ${h.tipo}">${TIPO_EMOJI[h.tipo]||'📦'}</div><div class="hi-info"><div class="hi-nome">${TIPO_LABEL[h.tipo]||h.tipo}</div><div class="hi-meta">${fmtData(h.data)}${h.status?' · '+h.status:''}</div></div><div class="hi-qty ${h.tipo}">${ip?'+':'-'}${qa}</div></div>`}).join(''):''}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:14px">
      <button class="btn btn-s btn-sm" onclick="fecharOv('ov-det');_fp(${JSON.stringify(nome)},'Estoque')">📦 Estoque</button>
      <button class="btn btn-s btn-sm" onclick="fecharOv('ov-det');_fp(${JSON.stringify(nome)},'Requisicao')">📋 Req.</button>
      <button class="btn btn-s btn-sm" onclick="fecharOv('ov-det');_fp(${JSON.stringify(nome)},'Expedicao')">🚚 Exped.</button>
    </div>
    <div style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Trocar ícone</div>
    <div class="emoji-opts">${EMOJIS.map(e=>`<span class="emoji-opt" onclick="trocarEmoji(${JSON.stringify(nome)},'${e}')">${e}</span>`).join('')}</div></div>`;
  abrirOv('ov-det');
}

function _fp(nome,tipo){
  const tm={Estoque:'estoque',Requisicao:'req',Expedicao:'exp'};
  navTo(tm[tipo]||'estoque');
  setTimeout(()=>{abrirForm();setTimeout(()=>{document.getElementById('f-insumo').value=encodeURIComponent(nome);onInsChange()},80)},80);
}

function trocarEmoji(nome,emoji){
  const ins=insumos.find(i=>i.nome===nome);if(ins){ins.emoji=emoji;salvarEmojis();renderEstoque();popularSelect()}
  fecharOv('ov-det');toast('Ícone atualizado!');
}

// ── NAV ───────────────────────────────────────────────────
const TABS=['estoque','req','exp','hist','rel'];
function navTo(tab){
  tabAtual=tab;
  TABS.forEach(t=>{document.getElementById('page-'+t)?.classList.toggle('active',t===tab);document.getElementById('nb-'+t)?.classList.toggle('active',t===tab)});
  document.getElementById('fab').style.display=['estoque','req','exp'].includes(tab)?'flex':'none';
  if(tab==='estoque')renderEstoque();
  else if(tab==='req')renderReq();
  else if(tab==='exp')renderExp();
  else if(tab==='hist')renderHist();
  else if(tab==='rel')renderRel();
}

// ── OVERLAY ───────────────────────────────────────────────
function abrirOv(id){document.getElementById(id).classList.add('open')}
function fecharOv(id){document.getElementById(id).classList.remove('open')}

// ── CSV ───────────────────────────────────────────────────
function exportarCSV(){
  const rows=historico.map(h=>`${fmtData(h.data)},"${nomeItem(h)||''}","${h.ref||''}","${h.tipo}",${Number(h.qtd)||0},"${h.status||''}"`);
  const csv=['Data,Item,Referência,Tipo,Quantidade,Status',...rows].join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'})),download:`insumos_${getDataContabil().replace(/\//g,'-')}.csv`});
  a.click();URL.revokeObjectURL(a.href);toast('CSV exportado!');
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3200)}

// ── INIT ──────────────────────────────────────────────────
carregarPend();
document.getElementById('turno-lbl').textContent=getTurno();
document.getElementById('data-pill').textContent=getDataContabil();
['req','exp','hist','rel'].forEach(t=>{periodos[t]='todos';buildChips(t)});
carregarTudo(false);
setInterval(carregarTudo,180000);
</script>
